<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
        }
        .overlay { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.4); 
        }
        .header { 
            position: absolute; 
            top: 30px; 
            width: 100%; 
            text-align: center; 
            color: white; 
            font-size: 32px; 
            font-weight: 700; 
        }
        .menu { 
            position: absolute; 
            top: 50%; 
            left: 60px; 
            transform: translateY(-50%); 
        }
        .menu a { 
            display: block; 
            margin: 15px 0; 
            padding: 14px 25px; 
            width: 200px; 
            text-decoration: none; 
            color: white; 
            font-size: 18px; 
            font-weight: 500; 
            border-radius: 8px; 
            transition: 0.3s; 
        }
        .vote { background: #3498db; } 
        .results { background: #2ecc71; } 
        .attendance { background: #f39c12; } 
        .announcement { background: #9b59b6; }
        .menu a:hover { transform: translateX(10px) scale(1.05); opacity: 0.9; }
        .top-right { 
            position: absolute; 
            top: 25px; 
            right: 30px; 
        }
        .top-right a { 
            color: white; 
            margin-left: 20px; 
            text-decoration: none; 
            font-size: 16px; 
        }
        .delete { color: #ff4d4d; }
        .announcement-box {
            position: absolute;
            bottom: 40px;
            left: 60px;
            width: 350px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            color: lightyellow;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div style="background-image: url('/static/student.jpg'); height:100vh; background-size:cover; position:relative">
    <div class="overlay"></div>

    <div class="header">
        Welcome {{ session['user'] }} 🎓
    </div>

    <div class="menu">
        <a href="{{ url_for('vote') }}" class="vote">🗳 Vote</a>
        <a href="{{ url_for('exam_results') }}" class="results">📊 Results</a>
        <a href="{{ url_for('attendance_page') }}" class="attendance">📅 Attendance</a>
        <a href="{{ url_for('announcements') }}" class="announcement">📢 Announcements</a>
    </div>

    <div class="top-right">
        <a href="{{ url_for('logout') }}">Logout</a>
        <a href="{{ url_for('delete_account') }}" onclick="return confirm('Are you sure?');" class="delete">Delete</a>
    </div>

    {% if announcement %}
        <div class="announcement-box">
            <strong>Latest Announcement:</strong><br>
            {{ announcement[0] }}
        </div>
    {% endif %}
</div>
</body>
</html>
