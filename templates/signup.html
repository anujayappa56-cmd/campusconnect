<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - CampusConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body style="margin:0; font-family:'Poppins', sans-serif;">

<div style="
    background-image: url('/static/signup.jpg');
    background-size: cover;
    background-position: center;
    height: 100vh;
    position: relative;
">

    <!-- Overlay -->
    <div style="
        position:absolute;
        width:100%;
        height:100%;
        background: rgba(0,0,0,0.45);
    "></div>

    <!-- Card -->
    <div style="
        position:absolute;
        top:50%;
        left:50%;
        transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.1);
        padding:35px;
        border-radius:12px;
        backdrop-filter: blur(10px);
        text-align:center;
        color:white;
        width:340px;
    ">

        <h2>Create Account</h2>

        <!-- Popup Message -->
        {% if message %}
        <script>
            alert("{{ message }}");
        </script>
        {% endif %}

        <form method="POST">

            <!-- ROLE FIRST -->
            <select id="role" name="role" onchange="updateForm()" required
            style="width:100%; padding:10px; margin-top:10px; border-radius:5px;">
                <option value="">Select Role</option>
                <option value="student">Student</option>
                <option value="lecturer">Lecturer</option>
                <option value="hod">HOD</option>
            </select>

            <!-- STUDENT ID (ONLY FOR STUDENT) -->
            <div id="student_id_field" style="display:none;">
                <input type="text" name="student_id" placeholder="Student ID"
                style="width:100%; padding:10px; margin-top:10px; border-radius:5px;">
            </div>

            <!-- SUBJECT (ONLY FOR LECTURER) -->
            <div id="subject_field" style="display:none;">
                <select name="subject"
                style="width:100%; padding:10px; margin-top:10px; border-radius:5px;">
                    <option value="">Select Subject</option>
                    <option value="PHP">PHP</option>
                    <option value="AI">AI</option>
                    <option value="Data Mining">Data Mining</option>
                    <option value="FDS">Fundamentals of Data Science</option>
                    <option value="WCMS">WCMS</option>
                </select>
            </div>

            <!-- USERNAME -->
            <input type="text" name="username" placeholder="Username" required
            style="width:100%; padding:10px; margin-top:10px; border-radius:5px;">

            <!-- PASSWORD -->
            <input type="password" name="password" placeholder="Password" required
            style="width:100%; padding:10px; margin-top:10px; border-radius:5px;">

            <!-- BUTTON -->
            <button type="submit" style="
                width:100%;
                padding:12px;
                margin-top:15px;
                border:none;
                border-radius:6px;
                background:#27ae60;
                color:white;
            ">
                Sign Up
            </button>

        </form>

        <br>

        <a href="/login" style="color:#ddd;">
            Already have an account? Login
        </a>

    </div>

</div>

<!-- JAVASCRIPT -->
<script>
function updateForm() {
    var role = document.getElementById("role").value;

    var studentField = document.getElementById("student_id_field");
    var subjectField = document.getElementById("subject_field");

    if (role === "student") {
        studentField.style.display = "block";
        subjectField.style.display = "none";
    }
    else if (role === "lecturer") {
        studentField.style.display = "none";   // ✅ REMOVED
        subjectField.style.display = "block";  // ✅ SHOW SUBJECT
    }
    else if (role === "hod") {
        studentField.style.display = "none";
        subjectField.style.display = "none";
    }
}
</script>

</body>
</html>
