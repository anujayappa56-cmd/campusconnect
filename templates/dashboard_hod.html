<!DOCTYPE html>
<html>
<head>
    <title>HOD Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('/static/hod.jpg') no-repeat center center/cover;
            height: 100vh;
            color: white;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100%;
            padding-top: 50px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            width: 250px;
            text-align: center;
            border-radius: 15px;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }

        .card h3 {
            margin-bottom: 20px;
        }

        .card a {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .card a:hover {
            background: #0056b3;
        }

        /* 🔴 Low Attendance Badge */
        .alert-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 20px;
        }

        .logout {
            text-align: center;
            margin-top: 50px;
        }

        .logout a {
            padding: 10px 25px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .logout a:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<div class="overlay">

    <h2>Welcome HOD - {{ session['user'] }}</h2>

    <div class="container">

        <div class="card">
            <h3>➕ Add Candidates</h3>
            <a href="/add_candidates">Open</a>
        </div>

        <div class="card">
            <div class="alert-badge">⚠ Below 70%</div>
            <h3>📊 View Attendance</h3>
            <a href="/hod_attendance">Open</a>
        </div>

        <div class="card">
            <h3>📢 Announcements</h3>
            <a href="/announcements">Open</a>
        </div>

    </div>

    <div class="logout">
        <a href="/logout">Logout</a>
    </div>

</div>

</body>
</html>
